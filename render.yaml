services:
  - type: web
    name: contract-risk-checker
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: HTTPS
        value: "true"
      - key: ADMIN_TOKEN
        sync: false
